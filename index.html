<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>支點運動空間</title>
  
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root {
      --bg: #f2f6f5;
      --card: #ffffff;
      --text: #1a2321;
      --muted: #7a8280;
      --primary: #127a69;
      --radius: 22px;
      --danger: #b23a2b;
      --selBg: #e5f2f0;
      --selText: #0d5c4f;
      --border: rgba(18,122,105,0.1);
      --safeB: env(safe-area-inset-bottom, 0px);
      --safeT: env(safe-area-inset-top, 0px);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { height: 100dvh; display: flex; flex-direction: column; max-width: 560px; margin: 0 auto; position: relative; z-index: 1; }
    .top { padding: 8px 14px 6px; padding-top: calc(8px + var(--safeT)); background: linear-gradient(180deg, var(--bg) 75%, rgba(242,246,245,0)); flex: 0 0 auto; }
    .steps { display: flex; gap: 10px; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid var(--border); border-radius: 999px; padding: 10px 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
    .step { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; min-width: 0; }
    .dot { width: 30px; height: 30px; border-radius: 999px; background: #dcece9; color: var(--primary); font-weight: 900; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; font-size: 14px; }
    .dot.active { background: var(--primary); color: #fff; }
    .label { font-size: 15px; font-weight: 900; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .label.active { color: var(--text); }
    
    /* Main Area Layout Fix */
    .main { flex: 1 1 auto; overflow: hidden; padding: 0 14px 4px; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
    .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: 0 12px 35px rgba(18,122,105,0.12); padding: 12px 14px; overflow: hidden; display: flex; flex-direction: column; }
    .card.hide { display: none !important; }

    .h { margin: 0 0 10px; font-weight: 950; font-size: 20px; color: var(--text); flex: 0 0 auto; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .courseGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
    .chip { padding: 14px 16px; border-radius: 16px; background: #eef2f1; font-weight: 950; font-size: 18px; cursor: pointer; border: 2px solid transparent; text-align: center; flex: 1 1 0; transition: all 0.2s; }
    .chip.sel { background: var(--selBg); border-color: rgba(18,122,105,.45); color: var(--selText); }
    .subTitle { margin: 12px 0 8px; font-weight: 950; font-size: 15px; color: var(--text); }

    /* ✨ 莫蘭迪綠浮凸名片 */
    .premium-trainer-card {
      background: linear-gradient(135deg, #eaf3f0 0%, #dbe7e2 100%);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 8px 8px 22px rgba(18, 122, 105, 0.12), -4px -4px 14px rgba(255, 255, 255, 0.85);
      border-radius: 26px;
      padding: 24px 18px 20px;
      overflow: hidden;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .premium-classic-layout { display: flex; align-items: center; justify-content: flex-start; gap: 18px; padding-left: 6px; }
    .premium-avatar-frame { width: 72px; height: 72px; border-radius: 50%; border: 2px solid var(--primary); padding: 2px; background: #fff; box-shadow: 0 4px 12px rgba(18,122,105,0.15); flex-shrink: 0; }
    .premium-meta-left { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .premium-job-title { font-size: 13px; font-weight: 950; color: var(--primary); letter-spacing: 1px; background: var(--selBg); padding: 2px 12px; border-radius: 999px; }
    
    /* 浮凸圖示圈 */
    .raised-icon-circle {
      width: 60px; height: 60px; border-radius: 50%; background: #ffffff; display: flex; align-items: center; justify-content: center;
      box-shadow: 5px 5px 12px rgba(18, 122, 105, 0.08), -3px -3px 8px rgba(255, 255, 255, 1);
      border: 1px solid rgba(18, 122, 105, 0.03);
    }

    /* Step 2 Layout Fixes */
    .step2Box { display: flex; flex-direction: column; gap: 10px; height: 100%; overflow-y: auto; padding-bottom: 8px; }
    .coachIntro { display: flex; gap: 10px; align-items: center; border: 1px solid var(--border); border-radius: 16px; padding: 10px; background: #fff; flex: 0 0 auto; }
    .avatar { width: 48px; height: 48px; border-radius: 999px; overflow: hidden; background: #ddd; flex: 0 0 auto; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    
    .cal { border-radius: 18px; border: 1px solid var(--border); padding: 10px; background: #fff; flex: 0 0 auto; }
    .calHead { display: grid; grid-template-columns: 42px 1fr 42px; gap: 10px; align-items: center; margin-bottom: 8px; padding: 0 4px; }
    .calBtn { width: 42px; height: 42px; border-radius: 14px; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,.06); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 22px; font-weight: 950; color: var(--primary); border: 1px solid var(--border); }
    .calBtn.disabled { opacity: 0.3; pointer-events: none; }
    .monthTitle { text-align: center; font-weight: 950; font-size: 16px; }
    .weekStrip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .dayCell { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 0; border-radius: 14px; border: 1px solid var(--border); background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,.05); cursor: pointer; min-height: 60px; }
    .dayCell.disabled { opacity: .35; pointer-events: none; }
    .dayCell.sel .dateDot { background: var(--primary); color: #fff; }
    .dateDot { width: 30px; height: 30px; border-radius: 999px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 950; color: var(--text); }
    
    .slotsArea { flex: 0 0 auto; display: flex; flex-direction: column; gap: 8px; }
    .tabs { display: flex; border-bottom: 2px solid var(--border); padding-bottom: 6px; }
    .tab { font-weight: 950; font-size: 15px; color: var(--muted); cursor: pointer; padding-bottom: 8px; position: relative; }
    .tab.active { color: var(--text); }
    .tab.active::after { content: ""; position: absolute; left: 0; right: 0; bottom: -2px; height: 4px; background: var(--primary); border-radius: 999px; }
    .slotGrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .slot { padding: 8px 0; border-radius: 999px; background: #eef2f1; font-weight: 950; font-size: 13px; text-align: center; cursor: pointer; border: 2px solid transparent; }
    .slot.sel { background: var(--selBg); color: var(--selText); border-color: rgba(18,122,105,.35); }
    .slot.disabled { opacity: .35; pointer-events: none; }

    .cartWrap { margin-top: 4px; padding-top: 6px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; flex: 1 1 auto; min-height: 100px; }
    .cartScrollArea { flex: 1 1 auto; overflow-y: auto; background: rgba(255,255,255,0.5); border-radius: 12px; padding: 6px; display: flex; flex-direction: column; gap: 6px; }
    .cartItem { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid var(--border); border-left: 4px solid var(--primary); border-radius: 8px; padding: 8px 10px; font-size: 13px; font-weight: 950; color: var(--text); }
    
    .footer { flex: 0 0 auto; padding: 4px 14px calc(4px + var(--safeB)); background: linear-gradient(0deg, var(--bg) 75%, rgba(246,247,248,0)); }
    .btnRow { display: flex; gap: 12px; }
    .btn { flex: 1; border: 0; border-radius: 16px; padding: 14px 12px; font-size: 16px; font-weight: 950; cursor: pointer; box-shadow: 0 4px 12px rgba(18,122,105,0.1); }
    .btnPrimary { background: var(--primary); color: #fff; }
    .btnGhost { background: #fff; color: var(--text); border: 1px solid rgba(0,0,0,.10); }
    .status { margin-top: 4px; font-size: 14px; color: var(--muted); text-align: center; font-weight: 900; }
  </style>
</head>

<body>
<div class="wrap">
  <div class="top">
    <div id="stepBar" class="steps">
      <div class="step"> <div id="dot1" class="dot active">1</div> <div id="lab1" class="label active">選教練</div> </div>
      <div class="step"> <div id="dot2" class="dot">2</div> <div id="lab2" class="label">選日期</div> </div>
      <div class="step"> <div id="dot3" class="dot">3</div> <div id="lab3" class="label">確認</div> </div>
    </div>
  </div>

  <div class="main">
    <div id="card1" class="card">
      <div class="h">Step 1｜選擇教練</div>
      <div id="coachRow" class="row"></div>
      <div class="subTitle">選擇課程</div>
      <div id="courseRow" class="courseGrid"></div>
      
      <div id="trainerCardWrap" class="hide" style="margin-top: 16px; flex: 1 1 auto;">
          <div class="premium-trainer-card">
              <div class="premium-classic-layout">
                  <div class="premium-avatar-frame">
                      <img id="tcAvatar" src="" alt="" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                  </div>
                  <div class="premium-meta-left">
                      <div id="tcName" style="font-size: 25px; font-weight: 950; color: var(--text); letter-spacing: 1.5px; line-height: 1.15;">--</div>
                      <div class="premium-job-title">資深教練</div>
                  </div>
              </div>
              
              <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 24px;">
                  <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                      <div class="raised-icon-circle">
                          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                              <circle cx="13" cy="4" r="2.5"></circle>
                              <path d="M13 9l-2 4.5l-3.5 1"></path>
                              <path d="M11 13.5l3 3.5l1.5 4"></path>
                              <path d="M13 9h4l2 3"></path>
                              <path d="M5.5 16l3.5 -2.5"></path>
                          </svg>
                      </div>
                      <span style="font-size: 12px; font-weight: 950; color: var(--text);">青少年體能</span>
                  </div>
                  <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                      <div class="raised-icon-circle">
                          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                              <circle cx="15" cy="5" r="2.5"></circle>
                              <path d="M8 21l3 -7l1 -5.5c-.5 -2.5 1.5 -4 4 -3.5c1 .5 2 2 1.5 4l-1.5 5.5"></path>
                              <path d="M11 14l4 7"></path>
                              <path d="M5 10c1.5 -3 4 -5 7 -5"></path>
                          </svg>
                      </div>
                      <span style="font-size: 12px; font-weight: 950; color: var(--text);">樂齡運動</span>
                  </div>
                  <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                      <div class="raised-icon-circle">
                          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                              <path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.566z" fill="rgba(18,122,105,0.08)"></path>
                              <line x1="6" y1="11" x2="18" y2="11" stroke-width="2.5"/>
                              <line x1="8" y1="8" x2="8" y2="14" stroke-width="2.5"/>
                              <line x1="16" y1="8" x2="16" y2="14" stroke-width="2.5"/>
                          </svg>
                      </div>
                      <span style="font-size: 12px; font-weight: 950; color: var(--text);">肌力&體能</span>
                  </div>
              </div>
          </div>
      </div>
    </div>

    <div id="card2" class="card hide" style="flex:1; min-height:0;">
      <div class="step2Box">
        <div class="h">Step 2｜選擇日期及時段</div>
        <div class="coachIntro">
          <div class="avatar"><img id="coachAvatar2" alt="" /></div>
          <div class="coachMeta">
            <div id="coachName2" style="font-weight:950;">—</div>
            <div id="coachTags2" style="font-size:12px; color:var(--muted);"></div>
          </div>
        </div>
        <div class="cal">
          <div class="calHead">
            <div id="prevWeek" class="calBtn">‹</div>
            <div id="monthTitle" class="monthTitle">—</div>
            <div id="nextWeek" class="calBtn">›</div>
          </div>
          <div id="weekStrip" class="weekStrip"></div>
        </div>
        <div class="slotsArea">
          <div class="tabs" style="justify-content: space-between; align-items: flex-end;">
            <div style="display:flex; gap:16px;">
              <div class="tab active" data-tab="am">上午</div>
              <div class="tab" data-tab="pm">下午</div>
              <div class="tab" data-tab="night">晚上</div>
            </div>
            <div style="font-size: 13px; font-weight: 900; color: var(--muted); padding-bottom: 8px;">
              剩餘 <span id="displayCredits" style="color: var(--primary); font-size: 16px;">--</span> 堂
            </div>
          </div>
          <div id="slotGrid2" class="slotGrid"></div>
        </div>
        <div class="cartWrap">
            <div id="cartList" class="cartScrollArea"></div>
        </div>
      </div>
    </div>

    <div id="card3" class="card hide" style="flex:1; min-height:0;">
      <div class="h">Step 3｜確認預約內容</div>
      <div id="confirmInfo" style="flex:1; overflow-y:auto;"></div>
    </div>
  </div>

  <div class="footer">
    <div class="btnRow">
      <button id="btnBack" class="btn btnGhost hide">上一步</button>
      <button id="btnNext" class="btn btnPrimary" disabled>下一步</button>
    </div>
    <div id="status" class="status">載入中…</div>
  </div>
</div>

<script>
  const LIFF_ID = '2010061750-qcqiDi53'; 
  const MAKE_OPTIONS_WEBHOOK_URL = 'https://hook.us2.make.com/v1p3s5or4opbvh5s7yxbvcw277xjizq7'; 
  const MAKE_BOOKING_WEBHOOK_URL = 'https://hook.us2.make.com/v1p3s5or4opbvh5s7yxbvcw277xjizq7'; 

  const COACHES = [
    { id:'coachA', name:'偉銘', avatar:'./images/weiming.jpg', tags:['肌力訓練','樂齡運動','青少年體能'] },
    { id:'coachB', name:'教練 B', avatar:'https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=240&q=80', tags:['肌力訓練','姿勢調整'] },
  ];

  const state = {
    step: 1, uid: '', name: '', coach: null, course: null,
    weekStart: null, dateKey: null, tab: 'am',
    cart: [], optionsRaw: [], availabilityMap: {}, loadingOptions: false,
    remainingCredits: 0
  };

  const $ = s => document.querySelector(s);
  const card1=$('#card1'), card2=$('#card2'), card3=$('#card3');
  const coachRow=$('#coachRow'), courseRow=$('#courseRow');
  const btnBack=$('#btnBack'), btnNext=$('#btnNext'), status=$('#status');
  const prevWeek=$('#prevWeek'), nextWeek=$('#nextWeek'), monthTitle=$('#monthTitle');
  const weekStrip=$('#weekStrip'), slotGrid2=$('#slotGrid2'), cartList=$('#cartList');

  // Helpers
  function addDays(d, n){ const x = new Date(d); x.setDate(x.getDate()+n); return x; }
  function startOfDay(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
  function weekStartMonday(d){ const x = startOfDay(d); const day = x.getDay(); return addDays(x, day === 0 ? -6 : 1 - day); }
  function pad2(n){ return String(n).padStart(2,'0'); }
  function ymd(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }

  function setStep(n){
    state.step = n;
    [1,2,3].forEach(i => {
        $(`#dot${i}`).classList.toggle('active', i===n);
        $(`#lab${i}`).classList.toggle('active', i===n);
    });
    card1.classList.toggle('hide', n!==1); card2.classList.toggle('hide', n!==2); card3.classList.toggle('hide', n!==3);
    btnBack.classList.toggle('hide', n===1);
    btnNext.textContent = (n===3) ? '確認送出' : '下一步';
  }

  function renderCoaches(){
    coachRow.innerHTML='';
    COACHES.forEach(c=>{
      const div=document.createElement('div');
      div.className='chip'+(state.coach?.id===c.id?' sel':'');
      div.textContent=c.name;
      div.onclick=()=>{
        state.coach=c;
        renderCoaches();
        $('#trainerCardWrap').classList.remove('hide');
        $('#tcAvatar').src = c.avatar;
        $('#tcName').textContent = c.name;
        checkStep1Ready();
      };
      coachRow.appendChild(div);
    });
  }

  function renderCourse(){
    courseRow.innerHTML='';
    ['1對1','1對2','包班'].forEach(n=>{
      const div=document.createElement('div');
      div.className='chip'+(state.course===n?' sel':'');
      div.textContent=n;
      div.onclick=()=>{ state.course=n; renderCourse(); checkStep1Ready(); };
      courseRow.appendChild(div);
    });
  }

  function checkStep1Ready(){ btnNext.disabled = !(state.coach && state.course); }

  function buildAvailabilityMap(options){
    const map = {};
    (options||[]).forEach(o=>{
      const raw = (o.value || o.label || '').toString();
      const m = raw.match(/^(\d{4})[\/-](\d{2})[\/-](\d{2})\s+(\d{2}:\d{2})$/);
      if(!m) return;
      const k=`${m[1]}-${m[2]}-${m[3]}`, t=m[4];
      if(!map[k]) map[k]=[];
      if(!map[k].includes(t)) map[k].push(t);
    });
    return map;
  }

  function renderWeekStrip(){
    monthTitle.textContent = `${state.weekStart.getMonth()+1}月 ${state.weekStart.getFullYear()}`;
    weekStrip.innerHTML='';
    const today = startOfDay(new Date());
    for(let i=0;i<7;i++){
      const d = addDays(state.weekStart, i);
      const key = ymd(d);
      const cell=document.createElement('div');
      cell.className='dayCell';
      if(startOfDay(d) < today || !state.availabilityMap[key]) cell.classList.add('disabled');
      if(state.dateKey===key) cell.classList.add('sel');
      
      cell.innerHTML = `<div style="font-size:12px;">${['一','二','三','四','五','六','日'][i]}</div><div class="dateDot">${d.getDate()}</div>`;
      cell.onclick=()=>{ if(!cell.classList.contains('disabled')){ state.dateKey=key; renderWeekStrip(); renderSlots(); } };
      weekStrip.appendChild(cell);
    }
  }

  function renderSlots(){
    slotGrid2.innerHTML='';
    if(!state.dateKey) return;
    const list = (state.availabilityMap[state.dateKey]||[]).filter(t=>{
      const h=parseInt(t);
      if(state.tab==='am') return h < 12;
      if(state.tab==='pm') return h >= 12 && h < 18;
      return h >= 18;
    });
    list.forEach(t=>{
      const isSel = state.cart.some(i=>i.date===state.dateKey && i.time===t);
      const div=document.createElement('div');
      div.className='slot'+(isSel?' sel':'');
      div.textContent=t;
      div.onclick=()=>{
        const idx = state.cart.findIndex(i=>i.date===state.dateKey && i.time===t);
        if(idx>=0) state.cart.splice(idx,1);
        else state.cart.push({date:state.dateKey, time:t});
        renderSlots();
        renderCart();
      };
      slotGrid2.appendChild(div);
    });
  }

  function renderCart(){
    cartList.innerHTML='';
    state.cart.forEach(i=>{
      const div=document.createElement('div');
      div.className='cartItem';
      div.innerHTML=`<span>${i.date} ${i.time}</span><span style="color:var(--danger); cursor:pointer;" onclick="removeItem('${i.date}','${i.time}')">✕</span>`;
      cartList.appendChild(div);
    });
    btnNext.disabled = state.cart.length === 0;
    $('#displayCredits').textContent = state.remainingCredits - state.cart.length;
  }

  window.removeItem = (d,t)=>{
    state.cart = state.cart.filter(i=>!(i.date===d && i.time===t));
    renderSlots(); renderCart();
  };

  async function loadOptions(){
    status.textContent='載入時段中...';
    try {
      const res = await fetch(MAKE_OPTIONS_WEBHOOK_URL, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({action:'getOptions', coachName:state.coach.name, course:state.course, userId:state.uid})
      });
      const data = await res.json();
      state.optionsRaw = data.options || [];
      state.availabilityMap = buildAvailabilityMap(state.optionsRaw);
      state.remainingCredits = data.remainingCredits || 0;
      state.weekStart = weekStartMonday(new Date());
      renderWeekStrip();
      setStep(2);
      $('#coachName2').textContent = state.coach.name;
      $('#coachAvatar2').src = state.coach.avatar;
    } catch(e){ status.textContent='載入失敗'; }
    status.textContent='';
  }

  async function init(){
    await liff.init({ liffId: LIFF_ID });
    if(!liff.isLoggedIn()){ liff.login(); return; }
    const p = await liff.getProfile(); state.uid = p.userId; state.name = p.displayName;
    renderCoaches(); renderCourse();
    
    // 行事曆切換監聽
    prevWeek.onclick = () => { state.weekStart = addDays(state.weekStart, -7); renderWeekStrip(); };
    nextWeek.onclick = () => { state.weekStart = addDays(state.weekStart, 7); renderWeekStrip(); };
    
    // 時段頁籤監聽
    document.querySelectorAll('.tab').forEach(el=>{
      el.onclick=()=>{
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        el.classList.add('active');
        state.tab = el.dataset.tab;
        renderSlots();
      };
    });

    btnNext.onclick=()=>{
      if(state.step===1) loadOptions();
      else if(state.step===2) {
        setStep(3);
        $('#confirmInfo').innerHTML = state.cart.map(i=>`<div class="cartItem">${i.date} ${i.time}</div>`).join('');
      }
      else if(state.step===3) sendBooking();
    };
    btnBack.onclick=()=>{ setStep(state.step-1); };
    status.textContent='';
  }

  async function sendBooking(){
    status.textContent='送出預約中...';
    btnNext.disabled=true;
    try {
      await fetch(MAKE_BOOKING_WEBHOOK_URL, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({action:'book', userId:state.uid, coachName:state.coach.name, bookings:state.cart})
      });
      await Swal.fire({icon:'success', title:'預約成功', confirmButtonColor:'#127a69'});
      liff.closeWindow();
    } catch(e){ status.textContent='送出失敗'; btnNext.disabled=false; }
  }

  init();
</script>
</body>
</html>
