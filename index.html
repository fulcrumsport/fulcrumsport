<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>支點運動空間</title>
  
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    /* 核心變數與色彩定義 */
    :root { 
      --bg: #f2f6f5; 
      --card-bg: #ffffff; 
      --text-main: #1a2321; 
      --text-muted: #7a8280; 
      --primary: #127a69; 
      --danger: #b23a2b;
      --border-color: #e0e5e4;
      --shadow: 0 4px 16px rgba(18, 122, 105, 0.08); 
      --radius: 16px; 
      --safe-bottom: env(safe-area-inset-bottom, 0px); 
      --safe-top: env(safe-area-inset-top, 0px);
    }
    
    * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text-main); overflow: hidden; }
    
    /* 主容器：限制最大寬度，呈現 App 感 */
    .app-container { 
      height: 100dvh; display: flex; flex-direction: column; 
      max-width: 560px; margin: 0 auto; background: var(--bg);
    }
    
    /* 頂部導航 (漸層背景) */
    .header-bar { 
      padding: calc(16px + var(--safe-top)) 20px 16px; 
      background: linear-gradient(180deg, #dcece9 0%, var(--bg) 100%);
      flex-shrink: 0;
    }
    .header-title { font-size: 20px; font-weight: 800; color: var(--primary); margin: 0; }

    /* 主要內容區：可捲動 */
    .main-content { 
      flex: 1; overflow-y: auto; padding: 0 16px 20px; 
      display: flex; flex-direction: column; gap: 16px; 
    }

    /* ---------------------------------- */
    /* 精品票券卡片 (預約確認 & 取消紀錄共用) */
    /* ---------------------------------- */
    .ticket-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border-color);
      overflow: hidden; /* 確保內容不溢出圓角 */
    }

    /* 時段列表區 (若多筆可內部捲動) */
    .ticket-slots-area {
      padding: 20px 20px 12px 20px;
      max-height: 200px; /* 限制高度，超出捲動 */
      overflow-y: auto;
    }
    .slot-item {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 8px;
      line-height: 1.4;
    }

    /* 緊湊資訊區 (常駐吸附感) */
    .ticket-info-area {
      padding: 0 20px;
      font-size: 14px;
      color: var(--text-muted); /* 一致的灰色小字 */
      line-height: 1.6;
    }
    
    /* 分隔線 */
    .ticket-divider {
      border-top: 1px dashed #cccccc;
      margin: 12px 20px;
    }

    /* 溫馨提醒 */
    .ticket-reminder {
      padding: 0 20px 20px 20px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .ticket-reminder-title { font-weight: 700; margin-bottom: 4px; }
    .ticket-reminder ul { margin: 0; padding-left: 16px; line-height: 1.5; }

    /* ---------------------------------- */
    /* 按鈕樣式 */
    /* ---------------------------------- */
    .btn-container { padding: 16px 20px calc(20px + var(--safe-bottom)); flex-shrink: 0; background: var(--bg); }
    .btn {
      width: 100%; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 700;
      border: none; cursor: pointer; text-align: center; transition: 0.2s;
    }
    .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(18,122,105,0.3); }
    .btn-danger { background: var(--danger); color: #fff; box-shadow: 0 4px 12px rgba(178,58,43,0.3); }
    .btn:active { transform: scale(0.98); }

    /* 隱藏區塊用 */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="app-container">
    
    <div class="header-bar">
      <h1 class="header-title" id="page-title">載入中...</h1>
    </div>

    <div id="view-booking-step3" class="main-content hidden">
      
      <div class="ticket-card">
        
        <div class="ticket-slots-area">
          <div class="slot-item">．2026-03-31 (二) 08:00</div>
          <div class="slot-item">．2026-03-31 (二) 09:00</div>
          </div>

        <div class="ticket-info-area">
          <div>教練：偉銘</div>
          <div>課程：1對1</div>
          <div>剩餘：23堂(1對1)</div>
        </div>

        <div class="ticket-divider"></div>

        <div class="ticket-reminder">
          <div class="ticket-reminder-title">溫馨提醒</div>
          <ul>
            <li>取消或改期，請於開課前 2 小時完成。</li>
            <li>如有任何問題，請於官方Line聯繫我們。</li>
          </ul>
        </div>
      </div>

      <div class="btn-container" style="padding:0;">
        <button class="btn btn-primary" onclick="submitBooking()">確認預約</button>
      </div>
    </div>


    <div id="view-record" class="main-content hidden">
      
      <div class="ticket-card">
        
        <div class="ticket-slots-area" style="padding-bottom: 12px;">
          <div class="slot-item">．2026-04-02 (四) 14:00</div>
        </div>

        <div class="ticket-info-area">
          <div>教練：偉銘</div>
          <div>課程：1對1</div>
          <div>剩餘：23堂(1對1)</div>
        </div>

        <div class="ticket-divider"></div>

        <div class="ticket-reminder">
          <div class="ticket-reminder-title">溫馨提醒</div>
          <ul>
            <li>取消或改期，請於開課前 2 小時完成。</li>
            <li>如有任何問題，請於官方Line聯繫我們。</li>
          </ul>
        </div>

        <div style="padding: 0 20px 20px 20px;">
          <button class="btn btn-danger" onclick="cancelBooking('record_id_123')">取消此筆預約</button>
        </div>
      </div>

    </div>

  </div>

  <script>
    // 模擬 LIFF 初始化與路由判斷
    document.addEventListener("DOMContentLoaded", () => {
      // 假設從 URL 參數獲取當前頁面模式 (預約 or 取消)
      const urlParams = new URLSearchParams(window.location.search);
      const pageMode = urlParams.get('page') || 'booking'; // 預設顯示 booking
      
      const titleEl = document.getElementById('page-title');
      const viewBooking = document.getElementById('view-booking-step3');
      const viewRecord = document.getElementById('view-record');

      if (pageMode === 'record') {
        titleEl.innerText = '管理我的預約';
        viewRecord.classList.remove('hidden');
      } else {
        titleEl.innerText = '確認預約資訊';
        viewBooking.classList.remove('hidden');
      }
    });

    // 模擬點擊確認預約
    function submitBooking() {
      Swal.fire({
        title: '處理中',
        text: '正在寫入預約資料...',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
      });
      // 在這裡串接您的 Make.com Webhook
    }

    // 模擬點擊取消預約
    function cancelBooking(id) {
      Swal.fire({
        title: '確定要取消此預約嗎？',
        text: "取消後將退回課程堂數",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#b23a2b',
        cancelButtonColor: '#7a8280',
        confirmButtonText: '是的，取消預約',
        cancelButtonText: '保留預約'
      }).then((result) => {
        if (result.isConfirmed) {
          Swal.fire('已送出取消', '請等待 LINE 訊息通知結果', 'success');
          // 在這裡串接您的 Make.com 取消 Webhook
        }
      })
    }
  </script>
</body>
</html>
