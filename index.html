<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>支點運動空間</title>
  
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root {
      --bg: #f2f6f5;
      --card: #ffffff;
      --text: #1a2321;
      --muted: #7a8280;
      --primary: #127a69;
      --radius: 22px;
      --danger: #b23a2b;
      --selBg: #e5f2f0;
      --selText: #0d5c4f;
      --border: rgba(18,122,105,0.1);
      --safeB: env(safe-area-inset-bottom, 0px);
      --safeT: env(safe-area-inset-top, 0px);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { height: 100dvh; display: flex; flex-direction: column; max-width: 560px; margin: 0 auto; position: relative; z-index: 1; }
    .top { padding: 8px 14px 6px; padding-top: calc(8px + var(--safeT)); background: linear-gradient(180deg, var(--bg) 75%, rgba(242,246,245,0)); flex: 0 0 auto; }
    .steps { display: flex; gap: 10px; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid var(--border); border-radius: 999px; padding: 10px 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
    .step { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; min-width: 0; }
    .dot { width: 30px; height: 30px; border-radius: 999px; background: #dcece9; color: var(--primary); font-weight: 900; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; font-size: 14px; }
    .dot.active { background: var(--primary); color: #fff; }
    .label { font-size: 15px; font-weight: 900; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .label.active { color: var(--text); }
    
    /* 核心佈局重構：將 .main 設為相對定位容器，確保內部絕對與吸底元素正常運作 */
    .main { flex: 1 1 auto; overflow: hidden; padding: 0 14px 4px; display: flex; flex-direction: column; gap: 10px; min-height: 0; position: relative; }
    .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: 0 12px 35px rgba(18,122,105,0.12); padding: 12px 14px; overflow: hidden; display: flex; flex-direction: column; }
    .h { margin: 0 0 10px; font-weight: 950; font-size: 20px; color: var(--text); flex: 0 0 auto; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .courseGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
    .chip { padding: 14px 16px; border-radius: 16px; background: #eef2f1; font-weight: 950; font-size: 18px; cursor: pointer; border: 2px solid transparent; text-align: center; flex: 1 1 0; transition: all 0.2s; }
    .chip.sel { background: var(--selBg); border-color: rgba(18,122,105,.45); color: var(--selText); }
    .chip.disabled { opacity: 0.5; pointer-events: none; background: #f0f0f0; color: #999; }
    .subTitle { margin: 12px 0 8px; font-weight: 950; font-size: 15px; color: var(--text); }
    
    /* ✨ 完美分離佈局：鎖定 Step 2 上下層高度，僅讓行事曆/時段層自由延展捲動 */
    .step2Box { display: flex; flex-direction: column; height: 100%; min-height: 0; justify-content: space-between; }
    .step2FixedTop { flex: 0 0 auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 6px; }
    .step2ScrollContent { flex: 1 1 auto; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; min-height: 0; padding-right: 2px; }
    .step2FixedBottom { flex: 0 0 auto; margin-top: 6px; }
    
    .coachIntro { display: flex; gap: 10px; align-items: center; border: 1px solid var(--border); border-radius: 16px; padding: 10px; background: #fff; }
    .avatar { width: 48px; height: 48px; border-radius: 999px; overflow: hidden; background: #ddd; flex: 0 0 auto; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cal { border-radius: 18px; border: 1px solid var(--border); padding: 10px; background: #fff; flex: 0 0 auto; }
    .calHead { display: grid; grid-template-columns: 42px 1fr 42px; gap: 10px; align-items: center; margin-bottom: 6px; }
    .calBtn { width: 42px; height: 42px; border-radius: 14px; background: #fff; box-shadow: 0 6px 16px rgba(0,0,0,.06); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 22px; font-weight: 950; color: var(--primary); border: 1px solid var(--border); }
    .calBtn.disabled { opacity: 0.3; pointer-events: none; }
    .monthTitle { text-align: center; font-weight: 950; font-size: 16px; }
    .weekStrip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .dayCell { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 6px 0; border-radius: 14px; border: 1px solid var(--border); background: #fff; box-shadow: 0 6px 16px rgba(0,0,0,.05); cursor: pointer; min-height: 64px; }
    .dayCell.disabled { opacity: .35; pointer-events: none; }
    .dayCell.hidden { visibility: hidden; }
    .dayCell.sel .dateDot { background: var(--primary); color: #fff; }
    .dateDot { width: 34px; height: 34px; border-radius: 999px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 950; color: var(--text); }
    .slotsArea { flex: 0 0 auto; display: flex; flex-direction: column; gap: 8px; padding-bottom: 4px; }
    .tabs { display: flex; border-bottom: 2px solid var(--border); padding-bottom: 6px; }
    .tab { font-weight: 950; font-size: 15px; color: var(--muted); cursor: pointer; padding-bottom: 8px; position: relative; }
    .tab.active { color: var(--text); }
    .tab.active::after { content: ""; position: absolute; left: 0; right: 0; bottom: -2px; height: 4px; background: var(--primary); border-radius: 999px; }
    .slotGrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .slot { padding: 8px 0; border-radius: 999px; background: #eef2f1; font-weight: 950; font-size: 13px; text-align: center; cursor: pointer; border: 2px solid transparent; }
    .slot.sel { background: var(--selBg); color: var(--selText); border-color: rgba(18,122,105,.35); }
    .slot.disabled { opacity: .35; pointer-events: none; }
    
    /* 下方購物車精確控制邊界，不再往上頂 */
    .cartWrap { padding-top: 6px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
    .cartScrollArea { overflow-y: auto; background: rgba(255,255,255,0.5); border-radius: 12px; padding: 6px; display: flex; flex-direction: column; gap: 6px; max-height: 110px; }
    .cartItem { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid var(--border); border-left: 4px solid var(--primary); border-radius: 8px; padding: 8px 10px; font-size: 13px; font-weight: 950; color: var(--text); }
    .repeatBtn { font-size: 11px; padding: 4px 10px; border-radius: 6px; background: #eef2f1; color: var(--primary); border: 1px solid #dcece9; cursor: pointer; font-weight: 900; }
    
    /* ✨ 垃圾桶圖示樣式 */
    .delBtn { width: 28px; height: 28px; font-size: 18px; display: flex; align-items: center; justify-content: center; color: var(--danger); background: #fff5f5; cursor: pointer; border-radius: 6px; }
    
    /* 獨立且絕對置底的提醒區塊設計 (Sticky Footer 模式) */
    .confirmWrap { display: flex; flex-direction: column; height: 100%; min-height: 0; position: relative; }
    .infoBox { flex: 1 1 auto; overflow-y: auto; min-height: 0; padding-bottom: 120px; /* 預留底部空間不被蓋住 */ }
    .confirmList { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .confirmItem { background: #fff; border: 1px solid var(--border); border-left: 5px solid var(--primary); border-radius: 14px; padding: 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 12px rgba(18,122,105,0.04); flex: 0 0 auto; }
    .confirmItem.marked-delete { background-color: #fff5f5; border-left: 5px solid var(--danger); }
    
    /* ✨ 關鍵解法：強制將溫馨提醒列黏貼於卡片底部，永遠不會被推擠消失 */
    .stickyRemindFooter {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 10px 4px 0;
      z-index: 10;
    }
    .remindTitle { font-weight: 950; font-size: 15px; color: var(--text); }
    .remindBox { width: 100%; font-size: 13px; line-height: 1.6; color: var(--text); }
    .remindBox ol { padding-left: 20px; margin: 4px 0 0 0; }
    .remindBox li { margin-bottom: 6px; font-weight: 700; color: #2b3634; }
    
    .footer { flex: 0 0 auto; padding: 4px 14px calc(4px + var(--safeB)); background: linear-gradient(0deg, var(--bg) 75%, rgba(246,247,248,0)); }
    .btnRow { display: flex; gap: 12px; }
    .btn { flex: 1; border: 0; border-radius: 16px; padding: 14px 12px; font-size: 16px; font-weight: 950; cursor: pointer; box-shadow: 0 4px 12px rgba(18,122,105,0.1); transition: all 0.2s; }
    .btnPrimary { background: var(--primary); color: #fff; }
    .btnGhost { background: #fff; color: var(--text); border: 1px solid rgba(0,0,0,.10); }
    .btnDanger { background: var(--danger); color: #fff; }
    .status { margin-top: 4px; font-size: 14px; color: var(--muted); text-align: center; font-weight: 900; min-height: 20px; }
    .statusError { color: var(--danger); font-weight: 950; }
    .hide { display: none !important; }
    .recordHeader { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .recordHeader .h { margin: 0; display: flex; align-items: center; }
    .recordCount { color: var(--primary); font-weight: 900; font-size: 14px; background: var(--selBg); padding: 4px 10px; border-radius: 999px; }
    .name-highlight { font-size: 28px; font-weight: 950; color: var(--text); background: linear-gradient(transparent 60%, rgba(18,122,105,0.25) 40%); padding: 0 4px; margin-right: 6px; display: inline-block; }
    #recordList { background: transparent; padding: 4px 2px; box-shadow: none; flex: 1 1 auto; overflow-y: auto; padding-bottom: 120px; }

    .record-tabs-container { display: flex; flex-direction: row; gap: 6px; margin-bottom: 12px; background: var(--selBg); padding: 5px; border-radius: 999px; flex: 0 0 auto; width: 100%; }
    .record-tab { flex: 1; text-align: center; font-weight: 950; font-size: 16px; color: var(--muted); cursor: pointer; padding: 10px 0; border-radius: 999px; transition: all 0.2s ease; user-select: none; }
    .record-tab.active { color: var(--primary); background: #ffffff; box-shadow: 0 2px 6px rgba(18,122,105,0.15); }

    /* ✨ 灰墨綠漸層名片 */
    .premium-trainer-card {
      background: linear-gradient(135deg, #f0f5f3 0%, #e1ebe7 100%);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 8px 8px 24px rgba(18,122,105,0.1), -4px -4px 12px rgba(255,255,255,0.9);
      border-radius: 26px;
      padding: 24px 18px 20px;
      overflow: hidden;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .premium-classic-layout { display: flex; align-items: center; justify-content: flex-start; gap: 18px; padding-left: 6px; }
    .premium-avatar-frame { width: 72px; height: 72px; border-radius: 50%; border: 2px solid var(--primary); padding: 2px; background: #fff; box-shadow: 0 4px 12px rgba(18,122,105,0.15); flex-shrink: 0; }
    .premium-meta-left { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .premium-job-title { font-size: 13px; font-weight: 950; color: var(--primary); letter-spacing: 1px; background: var(--selBg); padding: 2px 12px; border-radius: 999px; }
    .raised-icon-circle { width: 60px; height: 60px; border-radius: 50%; background: #ffffff; display: flex; align-items: center; justify-content: center; box-shadow: 5px 5px 12px rgba(18,122,105,0.08), -3px -3px 8px rgba(255,255,255,1); border: 1px solid rgba(18,122,105,0.03); }
    .raised-icon-circle svg { filter: drop-shadow(1px 1px 1px rgba(18,122,105,0.1)); }

    /* Swal2 彈窗優化 */
    .swal2-popup { border-radius: 20px !important; padding: 24px 20px !important; max-width: 340px !important; }
    .swal2-title { font-size: 19px !important; font-weight: 950 !important; color: #111 !important; margin: 0 !important; line-height: 1.4 !important; }
    .swal2-html-container { font-size: 15px !important; font-weight: 600 !important; color: #444 !important; margin: 12px 0 0 0 !important; line-height: 1.5 !important; }
    .swal2-actions { margin-top: 22px !important; gap: 12px; width: 100%; }
    .swal2-styled.swal2-confirm { border-radius: 14px !important; background-color: var(--primary) !important; font-weight: 950 !important; padding: 12px 24px !important; flex: 1; font-size: 15px !important; box-shadow: none !important; }
    .swal2-styled.swal2-cancel { border-radius: 14px !important; font-weight: 950 !important; color: #111 !important; background: #eef2f1 !important; padding: 12px 24px !important; flex: 1; font-size: 15px !important; box-shadow: none !important; }
  </style>
</head>

<body>
<div class="wrap">
  <div class="top">
    <div id="stepBar" class="steps">

      <div class="step"> <div id="dot2" class="dot">2</div> <div id="lab2" class="label">選日期</div> </div>

    </div>
  </div>

  <div class="main">

      <div id="coachRow" class="row"></div>

              </div>
              
              <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 24px;">
                  <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                      <div class="raised-icon-circle">
                          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                              <circle cx="13" cy="5" r="2.2"></circle>
                              <path d="M13 9.5l-2 4l-3 1"></path>
                              <path d="M11 13.5l2.5 3.5l1 3.5"></path>
                              <path d="M13 9.5h3.5l1.5 2.5"></path>

                  </div>
                  <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                      <div class="raised-icon-circle">
                          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                              <circle cx="14" cy="5" r="2.2"></circle>
                              <path d="M8 20l2.5 -6l1 -5c-.5 -2 1 -3.5 3 -3.5c1 .5 1.5 2 1 3.5l-1 5"></path>

                      <div class="raised-icon-circle">

              </div>
          </div>
      </div>
    </div>

    <div id="card2" class="card hide" style="flex:1; min-height:0;">

    </div>
  </div>

  <div class="footer">
    <div class="btnRow">
      <button id="btnBack" class="btn btnGhost hide">上一步</button>
      <button id="btnNext" class="btn btnPrimary" disabled>下一步</button>
      <div id="recordBtns" class="btnRow hide" style="width:100%;">
          <button id="btnHome" class="btn" style="background:#fff; color:var(--primary); border:2px solid var(--primary);">新增預約</button>
          <button id="btnCancelBatch" class="btn btnDanger" disabled>取消預約</button>
      </div>
    </div>
    <div id="status" class="status">載入中…</div>
  </div>
</div>

<script>

  function createSafeDate(dStr, tStr) {
      if (!dStr || !tStr) return new Date(0);

  }

  function startOfDay(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
  function addDays(d, n){ const x = new Date(d); x.setDate(x.getDate()+n); return x; }
  function weekStartMonday(d){ const x = startOfDay(d); const day = x.getDay(); return addDays(x, day === 0 ? -6 : 1 - day); }

  function addBatchItems(startDateKey, timeStr) {

  btnCancelBatch.onclick = function() {
      const count = state.selectedRecords.size; if(count === 0) return; const now = new Date(); let isTimeout = false;
      state.selectedRecords.forEach(index => { const classTime = createSafeDate(state.records[index].date, state.records[index].time); if (((classTime - now) / (1000 * 60 * 60)) < 3) isTimeout = true; });
      if (isTimeout) { Swal.fire({ icon: 'error', title: '操作逾時', html: '您勾選的清單中，有距離開課已不足 3 小時的時段，系統已自動鎖定。', confirmButtonColor: '#b23a2b' }); state.selectedRecords.clear(); renderRecordList(); updateRecordBtns(); return; }
      Swal.fire({ title: '確認取消預約', html: `即將為您取消勾選的 ${count} 堂課？`, icon: 'warning', showCancelButton: true, confirmButtonText: '確定取消', confirmButtonColor: '#d33', cancelButtonText: '返回' }).then((result) => { if (result.isConfirmed) executeBatchCancel(); });
  };

  async function executeBatchCancel() {
      setStatus("正在取消預約..."); const bookingsToCancel = []; state.selectedRecords.forEach(index => { bookingsToCancel.push(state.records[index]); });
      let refundedBookings = []; let expiredBookings = []; let failedBookings = []; let latestRemaining = "--";
      for (const booking of bookingsToCancel) {
          try {
              const res = await fetch(MAKE_QUERY_WEBHOOK_URL, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ action: "doCancel", userId: state.uid, bookings: [booking] }) });
              const rawResponseText = await res.text(); let result;
              try { const safeText = rawResponseText.replace(/:\s*,/g, ': "",').replace(/:\s*}/g, ': ""}'); result = JSON.parse(safeText); } catch (e) { throw new Error("回傳格式異常"); }
              const currentStatus = result.Status || result.status; const msg = result.Message || result.message || ""; const remain = result["Remaining credits"] !== undefined ? result["Remaining credits"] : (result.remainingCredits !== undefined ? result.remainingCredits : null);
              if (remain !== null) latestRemaining = remain;
              if (currentStatus === 'expired' || msg.includes('不予退還') || msg.includes('過期') || booking.改期狀態 === 'final') expiredBookings.push(booking);
              else if (currentStatus === 'success' || currentStatus === 'completed') refundedBookings.push(booking);
              else failedBookings.push(booking);
          } catch (e) { failedBookings.push(booking); }
      }
      const totalProcessed = refundedBookings.length + expiredBookings.length;
      if (totalProcessed > 0) {
          await Swal.fire({ icon: 'success', title: '處理完畢', html: `已成功為您取消 ${totalProcessed} 堂預約。`, confirmButtonColor: '#127a69' });
          if(liff.isInClient()) { try { await liff.sendMessages([createCancellationFlexMessage(refundedBookings, expiredBookings, latestRemaining)]); } catch (msgErr) {} }
          liff.closeWindow(); 
      } else { Swal.fire({ icon: 'error', title: '取消失敗', text: '連線異常，請重新操作或聯繫教練確認狀態。', confirmButtonColor: '#b23a2b' }); setStatus(""); }
  }

  window.showCannotReschedule = function(e) { e.stopPropagation(); Swal.fire({ icon: 'error', title: '無法改期', text: '該課程購買效期已過，且已更改過時段，不得再次更改。', confirmButtonColor: '#b23a2b' }); };
  function renderCourseTip() { if (state.step !== 1) return; setStatus('請選擇教練與課程'); }
  function hasAnySlots(){ return state.optionsRaw && state.optionsRaw.length > 0; }
  function buildAvailabilityMap(options){ const map = {}; (options||[]).forEach(o=>{ const raw = (o.value || o.label || '').toString(); const m = raw.match(/^(\d{4})[\/-](\d{2})[\/-](\d{2})\s+(\d{2}:\d{2})$/); if(!m) return; const k=`${m[1]}-${m[2]}-${m[3]}`, t=m[4]; if(!map[k]) map[k]=[]; if(!map[k].includes(t)) map[k].push(t); }); Object.keys(map).forEach(k=>map[k].sort()); return map; }
  function renderCoachIntro(){ if(!state.coach) return; coachAvatar2.src = state.coach.avatar; coachName2.textContent = state.coach.name; coachTags2.innerHTML=''; state.coach.tags.forEach(t=>{ const el=document.createElement('div'); el.className='tag'; el.textContent=t; coachTags2.appendChild(el); }); }
  function renderSlotsStep2(){ slotGrid2.innerHTML=''; if(!state.dateKey){ slotGrid2.innerHTML='<div class="slotTip important">請先選擇上方日期</div>'; return; } const list = (state.availabilityMap[state.dateKey]||[]).filter(t=>{ const h=parseInt(t); return state.tab==='am'?(h<12):state.tab==='pm'?(h>=12&&h<18):(h>=18); }); if(list.length===0){ slotGrid2.innerHTML='<div class="slotTip important">此時段無可預約時間</div>'; return; } list.forEach(t=>{ const disabled = !canBookNow(state.dateKey, t); const isSelected = state.cart.some(item => item.date === state.dateKey && item.time === t); const div=document.createElement('div'); div.className='slot'+(disabled?' disabled':'')+(isSelected?' sel':''); div.textContent=t; div.onclick=()=>{ if(!disabled) toggleCartItem(state.dateKey, t); }; slotGrid2.appendChild(div); }); }
  function renderWeekStrip(){ const ws = state.weekStart; monthTitle.textContent = monthYearLabel(ws); weekStrip.innerHTML=''; prevWeek.classList.toggle('disabled', ws <= weekStartMonday(new Date())); nextWeek.classList.toggle('disabled', addDays(ws,7) > getLimitDate()); for(let i=0;i<7;i++){ const d = addDays(ws, i); const key = ymd(d); const cell=document.createElement('div'); cell.className='dayCell'; if((startOfDay(d) < startOfDay(new Date())) || !state.availabilityMap[key] || d > getLimitDate() || state.loadingOptions) cell.classList.add('disabled'); if(state.dateKey===key) cell.classList.add('sel'); const dow=document.createElement('div'); dow.className='dowTxt'; dow.textContent=dowLabel(i); const dot=document.createElement('div'); dot.className='dateDot'; dot.textContent=d.getDate(); cell.append(dow, dot); cell.onclick=()=>{ if(!cell.classList.contains('disabled')) { state.dateKey=key; renderWeekStrip(); renderSlotsStep2(); updateStatusInStep2(); } }; weekStrip.appendChild(cell); } }
  function renderCoaches(){ coachRow.innerHTML=''; COACHES.forEach(c=>{ const div=document.createElement('div'); div.className='chip'+(state.coach?.id===c.id?' sel':''); div.textContent=c.name; if(state.mode === 'reschedule') div.classList.add('disabled'); div.onclick=()=>{ if(state.mode === 'reschedule') return; state.coach=c; renderCoaches(); renderCourse(); btnNext.disabled=!(state.coach && state.course); renderCourseTip(); }; coachRow.appendChild(div); }); if(state.coach) { $('#trainerCardWrap').classList.remove('hide'); $('#tcAvatar').src = state.coach.avatar; $('#tcName').textContent = state.coach.name; } else { $('#trainerCardWrap').classList.add('hide'); } }
  function renderCourse(){ courseRow.innerHTML=''; ['1對1','1對2','包班'].forEach(n=>{ const div=document.createElement('div'); div.className = 'chip' + (state.course===n ? ' sel' : ''); div.textContent = n; if(state.mode === 'reschedule') div.classList.add('disabled'); div.onclick=()=>{ if(state.mode === 'reschedule') return; state.course=n; renderCourse(); btnNext.disabled=!(state.coach && state.course); renderCourseTip(); }; courseRow.appendChild(div); }); }

  async function loadOptionsForCoach(){ state.weekStart = weekStartMonday(new Date()); state.loadingOptions=true; state.optionsRaw=[]; state.availabilityMap={}; state.dateKey=null; state.cart=[]; setStep(2); renderCoachIntro(); renderWeekStrip(); renderSlotsStep2(); renderCart(); try{ const res = await fetch(MAKE_OPTIONS_WEBHOOK_URL, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ action:"getOptions", coachName:state.coach.name, course:state.course, people:getPeopleCount(state.course), userId:state.uid, mode: state.mode }) }); const rawText = await res.text(); const safeText = rawText.trim().replace(/:\s*,/g, ': "",').replace(/:\s*}/g, ': ""}'); const data = JSON.parse(safeText); state.optionsRaw = Array.isArray(data.options)?data.options:[]; state.availabilityMap = buildAvailabilityMap(state.optionsRaw); const remain = data["Remaining credits"] ?? data.remainingCredits; if (remain !== undefined) state.remainingCredits = parseInt(remain, 10); renderCart(); }catch(e){} state.loadingOptions=false; renderWeekStrip(); renderSlotsStep2(); updateStatusInStep2(); }

  function bindTabListeners() {
      document.querySelectorAll('.tab').forEach(el => { el.onclick = () => { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); el.classList.add('active'); state.tab = el.dataset.tab; renderSlotsStep2(); }; });
      document.querySelectorAll('.record-tab').forEach(el => { el.onclick = () => { document.querySelectorAll('.record-tab').forEach(t => t.classList.remove('active')); el.classList.add('active'); state.recordTab = el.dataset.tab; state.selectedRecords.clear(); renderRecordList(); updateRecordBtns(); }; });
  }

  async function loadMyRecords() {
      state.mode = 'record';
      stepBar.classList.add('hide'); card1.classList.add('hide'); card2.classList.add('hide'); card3.classList.add('hide');
      cardRecord.classList.remove('hide'); btnBack.classList.add('hide'); btnNext.classList.add('hide'); recordBtns.classList.remove('hide'); 
      $('#recordListTitle').innerHTML = `<span class="name-highlight">${state.name}</span> 的預約清單`;
      setStatus("讀取預約紀錄中..."); recordList.innerHTML = '<div style="text-align:center; padding:40px; color:#111; font-weight:900;">讀取中...</div>';
      try {
          const res = await fetch(MAKE_QUERY_WEBHOOK_URL, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ action: "getRecords", userId: state.uid }) });
          const rawText = await res.text(); const safeText = rawText.trim().replace(/:\s*,/g, ': "",').replace(/:\s*}/g, ': ""}');
          let data = JSON.parse(safeText);
          if (typeof data.records === 'string') { try { data.records = JSON.parse(data.records); } catch(e){} }
          state.records = data.records || [];
          state.records.sort((a, b) => createSafeDate(a.date, a.time).getTime() - createSafeDate(b.date, b.time).getTime());
          
          const remain = data["Remaining credits"] ?? data.remainingCredits;
          if(remain !== undefined) state.recordRemaining = remain;
          if(data.credits_1on1 !== undefined) state.credits_1on1 = data.credits_1on1;
          if(data.credits_1on2 !== undefined) state.credits_1on2 = data.credits_1on2;
          if(data.credits_group !== undefined) state.credits_group = data.credits_group;
          renderRecordList(); updateRecordBtns(); setStatus("");
      } catch(e) { recordList.innerHTML = '<div style="text-align:center; padding:20px; color:var(--danger);">讀取失敗，請稍後再試</div>'; setStatus(""); }
  }

  async function init(){
    try { 
        await liff.init({ liffId: LIFF_ID }); 
        if(!liff.isLoggedIn()) { liff.login(); return; }
        const p = await liff.getProfile(); state.uid = p.userId; state.name = p.displayName; 
        bindTabListeners();
        
        prevWeek.onclick = () => {
            if (prevWeek.classList.contains('disabled')) return;
            state.weekStart = addDays(state.weekStart, -7);
            renderWeekStrip();
        };
        nextWeek.onclick = () => {
            if (nextWeek.classList.contains('disabled')) return;
            state.weekStart = addDays(state.weekStart, 7);
            renderWeekStrip();
        };

        const params = new URLSearchParams(window.location.search);
        if (params.get('page') === 'record') loadMyRecords(); 
        else { renderCoaches(); renderCourse(); state.weekStart = weekStartMonday(new Date()); renderWeekStrip(); setStep(1); }
    } catch(err) { setStatus('載入失敗，請重新整理', true); }

    btnBack.onclick=()=>{ if(state.step===2) setStep(1); else setStep(2); };
    btnHome.onclick = () => {
        window.history.replaceState({}, document.title, window.location.pathname); state.mode = 'book'; state.rescheduleSource = null; state.cart = []; state.course = null; state.coach = null;  
        renderCart(); stepBar.classList.remove('hide'); cardRecord.classList.add('hide'); recordBtns.classList.add('hide'); renderCoaches(); renderCourse(); renderCourseTip(); state.weekStart = weekStartMonday(new Date()); renderWeekStrip(); setStep(1);
    };

    btnNext.onclick=async ()=>{
      if(state.step===1){ await loadOptionsForCoach(); return; }
      if(state.step===2){ setStep(3); return; }
      if(state.step===3){
        btnNext.disabled=true; btnNext.textContent="處理中..."; setStatus("正在送出預約...");
        try{
           const isReschedule = state.mode === 'reschedule';
           const firstSelectedSlot = state.cart[0] || {};
           const payload = {
              action: isReschedule ? "reschedule" : "book", userId: state.uid, displayName: state.name, coachName: state.coach.name, course: state.course, people: getPeopleCount(state.course),
              newDate: isReschedule ? firstSelectedSlot.date : undefined, newTime: isReschedule ? firstSelectedSlot.time : undefined, newWeekday: isReschedule ? weekdayZhFromDateKey(firstSelectedSlot.date) : undefined,
              bookings: state.cart.map(item => ({ date: item.date, time: item.time, weekday: weekdayZhFromDateKey(item.date) }))
           };
           if (isReschedule && state.rescheduleSource) { payload.oldRowNumber = state.rescheduleSource.rowIndex || state.rescheduleSource.rowNumber || ""; payload.oldDate = state.rescheduleSource.date; payload.oldTime = state.rescheduleSource.time; }
           const res = await fetch(MAKE_BOOKING_WEBHOOK_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
           const rawText = await res.text(); 
           const safeResText = rawText.trim().replace(/:\s*,/g, ': "",').replace(/:\s*}/g, ': ""}');
           let result = JSON.parse(safeResText);
           if (result.Status === 'completed' || result.status === 'success' || result.Status === 'rescheduled') {
              const actualRemain = result["Remaining credits"] ?? result.remainingCredits ?? "--";
              state.remainingCredits = actualRemain !== "--" ? parseInt(actualRemain, 10) : 0;
              const alertTitle = isReschedule ? '更改成功' : '預約成功';
              const alertHtml = isReschedule ? '已成功更改私課預約時段！' : `已成功完成您的預約安排！`;
              await Swal.fire({ icon: 'success', title: alertTitle, html: alertHtml, confirmButtonColor: '#127a69' });
              if(liff.isInClient()) {
                  try { await liff.sendMessages([createSuccessFlexMessage(state.cart.length, actualRemain, state.cart.map(item => ({ date: item.date, time: item.time, weekday: weekdayZhFromDateKey(item.date) })), isReschedule, state.rescheduleSource)]); } catch (msgErr) {}
              }
              liff.closeWindow();
           } else { Swal.fire({ icon:'error', title: '糟糕！失敗', text: '時段可能已被佔走，請重新選擇時段。', confirmButtonColor: '#b23a2b' }); setStep(2); btnNext.disabled = false; btnNext.textContent = "確認送出"; }
        }catch(e){ Swal.fire({ icon:'error', title: '系統異常', text: '請稍後再試。' }); btnNext.disabled=false; btnNext.textContent="確認送出"; }
      }
    };
  }
  
  init();
</script>
</body>
