  <style>
    :root{--bg:#f2f6f5;--card:#ffffff;--text:#1a2321;--muted:#7a8280;--primary:#127a69;--border:rgba(18,122,105,0.1);--shadow:0 12px 35px rgba(18,122,105,0.12);--radius:22px;--danger:#b23a2b;--safeB:env(safe-area-inset-bottom,0px);--safeT:env(safe-area-inset-top,0px);--selBg:#e5f2f0;--selText:#0d5c4f}
    *{box-sizing:border-box}html,body{height:100%;overflow:hidden}body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}.wrap{height:100dvh;display:flex;flex-direction:column;max-width:560px;margin:0 auto;position:relative;z-index:1}.top{padding:8px 14px 6px;padding-top:calc(8px + var(--safeT));background:linear-gradient(180deg,var(--bg) 75%,rgba(242,246,245,0));flex:0 0 auto}.steps{display:flex;gap:10px;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:999px;padding:10px 12px;box-shadow:0 4px 15px rgba(0,0,0,0.04)}.step{display:flex;align-items:center;gap:8px;flex:1;justify-content:center;min-width:0}.dot{width:30px;height:30px;border-radius:999px;background:#dcece9;color:var(--primary);font-weight:900;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:14px}.dot.active{background:var(--primary);color:#fff}.label{font-size:15px;font-weight:900;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.label.active{color:var(--text)}.main{flex:1 1 auto;overflow:hidden;padding:0 14px 4px;display:flex;flex-direction:column;gap:10px;min-height:0}.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:12px 14px;overflow:hidden;display:flex;flex-direction:column}.h{margin:0 0 10px;font-weight:950;font-size:20px;color:var(--text);flex:0 0 auto}.row{display:flex;gap:12px;flex-wrap:wrap}.courseGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%}.chip{padding:14px 16px;border-radius:16px;background:#eef2f1;font-weight:950;font-size:18px;cursor:pointer;border:2px solid transparent;text-align:center;flex:1 1 0;transition:all 0.2s}.chip.sel{background:var(--selBg);border-color:rgba(18,122,105,.45);color:var(--selText)}.chip.disabled{opacity:0.5;pointer-events:none;background:#f0f0f0;color:#999}.subTitle{margin:12px 0 8px;font-weight:950;font-size:15px;color:var(--text)}.step2Box{display:flex;flex-direction:column;gap:8px;height:100%;min-height:0}.coachIntro{display:flex;gap:10px;align-items:center;border:1px solid var(--border);border-radius:16px;padding:10px;background:#fff;flex:0 0 auto}.avatar{width:48px;height:48px;border-radius:999px;overflow:hidden;background:#ddd;flex:0 0 auto}.avatar img{width:100%;height:100%;object-fit:cover;display:block}.cal{border-radius:18px;border:1px solid var(--border);padding:10px;background:#fff;flex:0 0 auto}.calHead{display:grid;grid-template-columns:42px 1fr 42px;gap:10px;align-items:center;margin-bottom:6px}.calBtn{width:42px;height:42px;border-radius:14px;background:#fff;box-shadow:0 6px 16px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;font-weight:950;color:var(--primary);border:1px solid var(--border)}.calBtn.disabled{opacity:0.3;pointer-events:none}.monthTitle{text-align:center;font-weight:950;font-size:16px}.weekStrip{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.dayCell{display:flex;flex-direction:column;align-items:center;gap:6px;padding:6px 0;border-radius:14px;border:1px solid var(--border);background:#fff;box-shadow:0 6px 16px rgba(0,0,0,.05);cursor:pointer;min-height:64px}.dayCell.disabled{opacity:.35;pointer-events:none}.dayCell.hidden{visibility:hidden}.dayCell.sel .dateDot{background:var(--primary);color:#fff}.dateDot{width:34px;height:34px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:950;color:var(--text)}.slotsArea{flex:0 0 auto;display:flex;flex-direction:column;gap:8px;padding-bottom:4px}.tabs{display:flex;border-bottom:2px solid var(--border);padding-bottom:6px}.tab{font-weight:950;font-size:15px;color:var(--muted);cursor:pointer;padding-bottom:8px;position:relative}.tab.active{color:var(--text)}.tab.active::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:4px;background:var(--primary);border-radius:999px}.slotGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.slot{padding:8px 0;border-radius:999px;background:#eef2f1;font-weight:950;font-size:13px;text-align:center;cursor:pointer;border:2px solid transparent}.slot.sel{background:var(--selBg);color:var(--selText);border-color:rgba(18,122,105,.35)}.slot.disabled{opacity:.35;pointer-events:none}.cartWrap{margin-top:4px;padding-top:6px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;flex:1 1 auto;min-height:0}.cartScrollArea{flex:1 1 auto;overflow-y:auto;background:rgba(255,255,255,0.5);border-radius:12px;padding:6px;display:flex;flex-direction:column;gap:6px}.cartItem{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:8px;padding:8px 10px;font-size:13px;font-weight:950;color:var(--text)}.repeatBtn{font-size:11px;padding:4px 10px;border-radius:6px;background:#eef2f1;color:var(--primary);border:1px solid #dcece9;cursor:pointer;font-weight:900}.delBtn{width:28px;height:28px;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--danger);background:#fff5f5;cursor:pointer;border-radius:6px}.confirmList{display:flex;flex-direction:column;gap:10px;margin-top:4px;flex:1 1 auto;overflow-y:auto;min-height:0;padding-bottom:8px}.confirmItem{background:#fff;border:1px solid var(--border);border-left:5px solid var(--primary);border-radius:14px;padding:16px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 12px rgba(18,122,105,0.04)}.confirmItem.marked-delete{background-color:#fff5f5;border-left:5px solid var(--danger)}.remindBox{width:100%;font-size:13px;line-height:1.6;color:var(--text);flex:0 0 auto}.remindBox ol { padding-left: 20px; margin: 4px 0 0 0; }.remindBox li { margin-bottom: 6px; font-weight: 700; color: #2b3634; }
    .footer{flex:0 0 auto;padding:4px 14px calc(4px + var(--safeB));background:linear-gradient(0deg,var(--bg) 75%,rgba(246,247,248,0))}.btnRow{display:flex;gap:12px}.btn{flex:1;border:0;border-radius:16px;padding:14px 12px;font-size:16px;font-weight:950;cursor:pointer;box-shadow:var(--shadow);transition:all 0.2s}.btnPrimary{background:var(--primary);color:#fff}.btnGhost{background:#fff;color:var(--text);border:1px solid rgba(0,0,0,.10)}.btnDanger{background:var(--danger);color:#fff}.status{margin-top:4px;font-size:14px;color:var(--muted);text-align:center;font-weight:900;min-height:20px}.hide{display:none!important}

    /* ✨ 名片頂級設計：微光浮島 + 絕對置中整合式排版 */
    .premium-trainer-card {
        background: #ffffff;
        border: none;
        box-shadow: 0 14px 45px rgba(18, 122, 105, 0.18), 0 4px 12px rgba(0, 0, 0, 0.05);
        border-radius: 26px;
        padding: 26px 20px 22px;
        overflow: hidden;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }
    .premium-centering-group {
        display: flex;
        align-items: center;
        justify-content: center; /* 名片核心組件置中 */
        gap: 18px;
        width: 100%;
    }
    .premium-avatar-frame {
        width: 76px;
        height: 76px;
        border-radius: 50%;
        border: 2px solid var(--primary);
        padding: 2.5px;
        background: #fff;
        box-shadow: 0 4px 15px rgba(18, 122, 105, 0.15);
        flex-shrink: 0;
    }
    .premium-meta-box {
        display: flex;
        flex-direction: column;
        align-items: center; /* 名字職稱垂直置中 */
        gap: 4px;
    }
    .premium-job-title {
        font-size: 13px;
        font-weight: 950;
        color: var(--primary);
        letter-spacing: 1px;
        background: var(--selBg);
        padding: 2px 12px;
        border-radius: 99px;
    }
    /* 專長圖示「浮凸感」專屬樣式 */
    .raised-icon-circle {
        width: 62px;
        height: 62px;
        border-radius: 50%;
        background: #f8fbfb;
        display: flex;
        align-items: center;
        justify-content: center;
        /* 雙重陰影製造浮凸擬物感 */
        box-shadow: 6px 6px 14px rgba(18, 122, 105, 0.1), 
                    -4px -4px 10px rgba(255, 255, 255, 1);
        border: 1px solid rgba(18, 122, 105, 0.05);
    }
    .raised-icon-circle svg { filter: drop-shadow(2px 2px 2px rgba(18,122,105,0.1)); }

    /* Swal2 高質感外觀 */
    .swal2-popup { border-radius: 20px !important; padding: 24px 20px !important; }
    .swal2-title { font-size: 19px !important; font-weight: 950 !important; color: #111 !important; }
    .swal2-styled.swal2-confirm { border-radius: 14px !important; background-color: var(--primary) !important; font-weight: 950 !important; }
    .swal2-styled.swal2-cancel { border-radius: 14px !important; font-weight: 950 !important; }
  </style>
</head>

<body>
<div class="wrap">
  <div class="top">

    </div>

  <div class="main">
    <div id="card1" class="card">

                             <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="margin-top: -10px;"><line x1="6" y1="12" x2="18" y2="12"/><line x1="7" y1="8" x2="7" y2="16"/><line x1="17" y1="8" x2="17" y2="16"/></svg>

</div>

<script>
  const LIFF_ID = '2010061750-qcqiDi53'; 
  const MAKE_OPTIONS_WEBHOOK_URL = 'https://hook.us2.make.com/v1p3s5or4opbvh5s7yxbvcw277xjizq7'; 
  const MAKE_BOOKING_WEBHOOK_URL = 'https://hook.us2.make.com/v1p3s5or4opbvh5s7yxbvcw277xjizq7'; 
  const MAKE_QUERY_WEBHOOK_URL = 'https://hook.us2.make.com/v1p3s5or4opbvh5s7yxbvcw277xjizq7'; 

  const COACHES = [
    { id:'coachA', name:'偉銘', avatar:'https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=240&q=80', tags:['肌力訓練','樂齡運動','青少年體能'] },
    { id:'coachB', name:'教練 B', avatar:'https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=240&q=80', tags:['肌力訓練','姿勢調整','初學友善'] },
  ];

  const state = {
    step: 1, uid: '', name: '', coach: null, course: null,
    weekStart: null, dateKey: null, tab: 'am', recordTab: '1對1',
    cart: [], optionsRaw: [], availabilityMap: {}, loadingOptions: false,
    mode: 'book', rescheduleSource: null, records: [], selectedRecords: new Set(),
    remainingCredits: 0, recordRemaining: undefined, credits_1on1: undefined, credits_1on2: undefined, credits_group: undefined
  };

  const $ = s => document.querySelector(s);
  const dot1=$('#dot1'), dot2=$('#dot2'), dot3=$('#dot3');
  const lab1=$('#lab1'), lab2=$('#lab2'), lab3=$('#lab3');
  const card1=$('#card1'), card2=$('#card2'), card3=$('#card3'), cardRecord=$('#cardRecord');
  const coachRow=$('#coachRow'), courseRow=$('#courseRow');
  const btnBack=$('#btnBack'), btnNext=$('#btnNext'), status=$('#status');
  const btnHome=$('#btnHome'), btnCancelBatch=$('#btnCancelBatch'), recordBtns=$('#recordBtns');
  const coachAvatar2=$('#coachAvatar2'), coachName2=$('#coachName2'), coachTags2=$('#coachTags2');
  const prevWeek=$('#prevWeek'), nextWeek=$('#nextWeek'), monthTitle=$('#monthTitle');
  const weekStrip=$('#weekStrip'), slotGrid2=$('#slotGrid2'), confirmInfo=$('#confirmInfo');
  const cartList=$('#cartList'), recordList=$('#recordList'), stepBar=$('#stepBar'); 

  const TRASH_SVG = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="icon-trash" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>`;

  function createSafeDate(dStr, tStr) {
      if (!dStr || !tStr) return new Date(0);
      const cleanD = dStr.replace(/[\/\.]/g, '-');
      const [y, m, d] = cleanD.split('-').map(Number);
      const [h, min] = tStr.split(':').map(Number);
      return new Date(y, m - 1, d, h, min);
  }

  function pad2(n){ return String(n).padStart(2,'0'); }
  function ymd(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
  function startOfDay(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
  function addDays(d, n){ const x = new Date(d); x.setDate(x.getDate()+n); return x; }
  function weekStartMonday(d){ const x = startOfDay(d); const day = x.getDay(); return addDays(x, day === 0 ? -6 : 1 - day); }
  function monthYearLabel(ws){ return `${ws.getMonth()+1}月 ${ws.getFullYear()}`; }
  function dowLabel(idx){ return ['一','二','三','四','五','六','日'][idx] || ''; }
  function weekdayZhFromDateKey(dateKey){ 
      if(!dateKey) return '';
      return ['日','一','二','三','四','五','六'][new Date(dateKey.replace(/-/g,'/')).getDay()]||''; 
  }
  function isTruthy(val) {
      if (val === true) return true;
      const s = String(val).trim().toLowerCase();
      return s === 'true' || s === 'yes' || s === '過期' || s === '到期';
  }
  function setStatus(msg, isError=false){ status.classList.toggle('statusError', !!isError); status.innerHTML = msg || ''; }

  function renderCourseTip() {
      if (state.step !== 1) return;
      setStatus('請選擇教練與課程');
  }

  function updateStatusInStep2() {
      if(state.loadingOptions) setStatus(`讀取 ${state.coach.name} 的可預約時段中…`);
      else if(state.cart.length > 0) setStatus(`已選擇 ${state.cart.length} 堂課`);
      else if(!hasAnySlots()) setStatus('目前沒有可預約的時段', true);
      else if(state.dateKey) setStatus(`已選日期：${state.dateKey}`);
      else setStatus('請先選擇上方日期');
  }

  function getAvailableRecurringWeeks(startDateKey, timeStr) {
      let count = 0; let current = new Date(startDateKey.replace(/-/g,'/'));
      for (let i = 1; i <= 12; i++) {
          current = addDays(current, 7); if (current > getLimitDate()) break; 
          const dKey = ymd(current); const slotsForDay = state.availabilityMap[dKey];
          if (slotsForDay && slotsForDay.includes(timeStr) && canBookNow(dKey, timeStr)) count++;
      }
      return count;
  }

  function setStep(n){
    state.step = n;
    [dot1,dot2,dot3].forEach((d,i)=>d.classList.toggle('active', i+1===n));
    [lab1,lab2,lab3].forEach((l,i)=>l.classList.toggle('active', i+1===n));
    card1.classList.toggle('hide', n!==1); card2.classList.toggle('hide', n!==2); card3.classList.toggle('hide', n!==3);
    cardRecord.classList.add('hide'); status.classList.remove('statusError'); recordBtns.classList.add('hide'); 
    if(n===1){
      btnBack.classList.add('hide'); btnNext.classList.remove('hide'); btnNext.textContent='下一步';
      btnNext.disabled = !(state.coach && state.course); renderCourseTip();
      const cardWrap = document.getElementById('trainerCardWrap');
      if(cardWrap) cardWrap.classList.toggle('hide', !state.coach);
    }
    if(n===2){
      btnBack.classList.remove('hide'); btnNext.classList.remove('hide');
      btnNext.disabled = state.cart.length === 0; updateStatusInStep2(); renderCart();
    }
    if(n===3){
      btnBack.classList.remove('hide'); btnNext.classList.remove('hide'); btnNext.textContent='確認送出';
      btnNext.disabled = state.cart.length === 0; renderStep3Content(); 
    }
  }

  // ✨ 強化過期標示與改期圖示邏輯：判讀驚嘆號+行事曆，並限制過期課程僅限改期一次
  function renderRecordList() {
      const records = state.records; let filteredCount = 0; let html = '';
      records.forEach((r, originalIndex) => {
          const courseDisplay = getCourseName(r.course, r.people); if (courseDisplay !== state.recordTab) return; 
          if (r.改期狀態 === 'yes' || r.改期狀態 === '作廢') return;

          filteredCount++; const isMarked = state.selectedRecords.has(originalIndex);
          const classTime = createSafeDate(r.date, r.time); const now = new Date(); 
          const canCancel = ((classTime - now) / (1000 * 60 * 60)) >= 3;
          
          // ✨ 關鍵判讀邏輯：對齊試算表 P 欄 (扣堂來源是否到期)
          const isExpired = isTruthy(r.isExpired) || isTruthy(r.isCardExpired) || isTruthy(r["扣堂來源是否到期"]) || isTruthy(r["扣堂來源是否到期 (L)"]);
          
          // ✨ 過期課程只要改過一次 (yes) 或標記為 final，立刻判定為最終狀態不可再動
          const isFinal = isExpired && (r.改期狀態 === 'final' || r.改期狀態 === 'yes');
          const canReschedule = (!isExpired) || (isExpired && !isFinal);
          
          const iconColor = isExpired ? 'var(--danger)' : 'var(--primary)';
          const displayDate = (r.date || '').replace(/\//g, '-');
          
          // ✨ 精準渲染驚嘆號 + 行事曆 SVG (針對過期課程)
          const innerSVGPath = isExpired 
              ? `<path d="M12 13v4"></path><path d="M12 20h.01"></path>` 
              : `<path d="M7 15l2 2 4-4"></path>`;
              
          const rescheduleIconSVG = `<div class="icon-reschedule" onclick="startReschedule(event, ${originalIndex}, ${isExpired})" style="margin-right: 6px; display:inline-block; color: ${iconColor};"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>${innerSVGPath}</svg></div>`;
          
          const finalIconSVG = `<div class="icon-reschedule" onclick="showCannotReschedule(event)" style="margin-right: 6px; display:inline-block; color: var(--danger);"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg></div>`;
          
          const undoIconSVG = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="icon-undo" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>`;
          
          let actionContent = '';
          if (!canCancel) {
              actionContent = `<span style="font-size:12px; color:var(--muted); font-weight:900; background:#f0f0f0; padding:4px 8px; border-radius:6px;">已鎖定</span>`;
          } else {
              if (canReschedule && !isMarked) { actionContent += rescheduleIconSVG; } 
              else if (isFinal && !isMarked) { actionContent += finalIconSVG; }
              actionContent += `<div style="display:inline-block; cursor:pointer;" onclick="toggleDeleteMark(event, ${originalIndex})">` + (isMarked ? undoIconSVG : TRASH_SVG) + `</div>`;
          }
          html += `<div class="confirmItem ${isMarked ? 'marked-delete' : ''}"><div style="display:flex; align-items:center; gap:10px;"><div class="record-text" style="display:flex; flex-direction:column; gap:4px;"><span class="record-date" style="font-size:17px; font-weight:950; color:var(--text); letter-spacing:0.5px;">${displayDate} (${r.weekday}) ${r.time}</span><span style="font-size:14px; font-weight:900; color:var(--muted); margin-top:2px;">教練：${r.coach} &nbsp; 課程：${courseDisplay}</span></div></div><div class="step3Del">${actionContent}</div></div>`;
      });
      $('#myRecordCount').textContent = `共 ${filteredCount} 堂`;
      recordList.innerHTML = filteredCount === 0 ? '<div style="text-align:center; padding:40px; color:#111; font-weight:900;">此分類無預約紀錄</div>' : html;
  }

  // 其他初始化與按鈕邏輯維持穩定運作...
  function bindTabListeners() {
      document.querySelectorAll('.tab').forEach(el => {
          el.onclick = () => { 
              document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); 
              el.classList.add('active'); state.tab = el.dataset.tab; renderSlotsStep2(); 
          };
      });
  }

  async function init(){
    try { 
        await liff.init({ liffId: LIFF_ID }); 
        if(!liff.isLoggedIn()) { liff.login(); return; }
        const p = await liff.getProfile(); state.uid = p.userId; state.name = p.displayName; 
        bindTabListeners();
        const params = new URLSearchParams(window.location.search);
        if (params.get('page') === 'record') loadMyRecords(); 
        else { renderCoaches(); renderCourse(); state.weekStart = weekStartMonday(new Date()); renderWeekStrip(); setStep(1); }
    } catch(err) { setStatus('載入失敗，請重新整理', true); }

    btnBack.onclick=()=>{ if(state.step===2) setStep(1); else setStep(2); };
    btnHome.onclick = () => {
        window.history.replaceState({}, document.title, window.location.pathname); state.mode = 'book'; state.rescheduleSource = null; state.cart = []; state.course = null; state.coach = null;  
        renderCart(); stepBar.classList.remove('hide'); cardRecord.classList.add('hide'); recordBtns.classList.add('hide'); renderCoaches(); renderCourse(); renderCourseTip(); state.weekStart = weekStartMonday(new Date()); renderWeekStrip(); setStep(1);
    };

    btnNext.onclick=async ()=>{
      if(state.step===1){ await loadOptionsForCoach(); return; }
      if(state.step===2){ setStep(3); return; }
      if(state.step===3){
        btnNext.disabled=true; btnNext.textContent="處理中..."; setStatus("正在送出預約...");
        try{
           const isReschedule = state.mode === 'reschedule';
           const firstSelectedSlot = state.cart[0] || {};
           const payload = {
              action: isReschedule ? "reschedule" : "book", userId: state.uid, displayName: state.name, coachName: state.coach.name, course: state.course, people: getPeopleCount(state.course),
              newDate: isReschedule ? firstSelectedSlot.date : undefined, newTime: isReschedule ? firstSelectedSlot.time : undefined, newWeekday: isReschedule ? weekdayZhFromDateKey(firstSelectedSlot.date) : undefined,
              bookings: state.cart.map(item => ({ date: item.date, time: item.time, weekday: weekdayZhFromDateKey(item.date) }))
           };
           if (isReschedule && state.rescheduleSource) { payload.oldRowNumber = state.rescheduleSource.rowIndex || state.rescheduleSource.rowNumber || ""; payload.oldDate = state.rescheduleSource.date; payload.oldTime = state.rescheduleSource.time; }
           const res = await fetch(MAKE_BOOKING_WEBHOOK_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
           const rawText = await res.text(); 
           const safeResText = rawText.trim().replace(/:\s*,/g, ': "",').replace(/:\s*}/g, ': ""}');
           let result = JSON.parse(safeResText);
           if (result.Status === 'completed' || result.status === 'success' || result.Status === 'rescheduled') {
              const actualRemain = result["Remaining credits"] ?? result.remainingCredits ?? "--";
              state.remainingCredits = actualRemain !== "--" ? parseInt(actualRemain, 10) : 0;
              const alertTitle = isReschedule ? '更改成功' : '預約成功';
              const alertHtml = isReschedule ? '已成功更改私課預約時段！' : `已成功完成您的預約安排！`;
              await Swal.fire({ icon: 'success', title: alertTitle, html: alertHtml, confirmButtonColor: '#127a69' });
              if(liff.isInClient()) {
                  try { await liff.sendMessages([createSuccessFlexMessage(state.cart.length, actualRemain, state.cart.map(item => ({ date: item.date, time: item.time, weekday: weekdayZhFromDateKey(item.date) })), isReschedule, state.rescheduleSource)]); } catch (msgErr) {}
              }
              liff.closeWindow();
           } else { Swal.fire({ icon:'error', title: '糟糕！失敗', text: '時段可能已被佔走，請重新選擇時段。', confirmButtonColor: '#b23a2b' }); setStep(2); btnNext.disabled = false; btnNext.textContent = "確認送出"; }
        }catch(e){ Swal.fire({ icon:'error', title: '系統異常', text: '請稍後再試。' }); btnNext.disabled=false; btnNext.textContent="確認送出"; }
      }
    };
  }
  
  // 剩餘函數維持邏輯穩定...
  function renderCoaches(){ coachRow.innerHTML=''; COACHES.forEach(c=>{ const div=document.createElement('div'); div.className='chip'+(state.coach?.id===c.id?' sel':''); div.textContent=c.name; if(state.mode === 'reschedule') div.classList.add('disabled'); div.onclick=()=>{ if(state.mode === 'reschedule') return; state.coach=c; renderCoaches(); renderCourse(); btnNext.disabled=!(state.coach && state.course); renderCourseTip(); }; coachRow.appendChild(div); }); if(state.coach) { $('#trainerCardWrap').classList.remove('hide'); $('#tcAvatar').src = state.coach.avatar; $('#tcName').textContent = state.coach.name; } else { $('#trainerCardWrap').classList.add('hide'); } }
  function renderCourse(){ courseRow.innerHTML=''; ['1對1','1對2','包班'].forEach(n=>{ const div=document.createElement('div'); div.className = 'chip' + (state.course===n ? ' sel' : ''); div.textContent = n; if(state.mode === 'reschedule') div.classList.add('disabled'); div.onclick=()=>{ if(state.mode === 'reschedule') return; state.course=n; renderCourse(); btnNext.disabled=!(state.coach && state.course); renderCourseTip(); }; courseRow.appendChild(div); }); }
  function renderWeekStrip(){ const ws = state.weekStart; monthTitle.textContent = monthYearLabel(ws); weekStrip.innerHTML=''; prevWeek.classList.toggle('disabled', ws <= weekStartMonday(new Date())); nextWeek.classList.toggle('disabled', addDays(ws,7) > getLimitDate()); for(let i=0;i<7;i++){ const d = addDays(ws, i); const key = ymd(d); const cell=document.createElement('div'); cell.className='dayCell'; if((startOfDay(d) < startOfDay(new Date())) || !state.availabilityMap[key] || d > getLimitDate() || state.loadingOptions) cell.classList.add('disabled'); if(state.dateKey===key) cell.classList.add('sel'); const dow=document.createElement('div'); dow.className='dowTxt'; dow.textContent=dowLabel(i); const dot=document.createElement('div'); dot.className='dateDot'; dot.textContent=d.getDate(); cell.append(dow, dot); cell.onclick=()=>{ if(!cell.classList.contains('disabled')) { state.dateKey=key; renderWeekStrip(); renderSlotsStep2(); updateStatusInStep2(); } }; weekStrip.appendChild(cell); } }
  function renderSlotsStep2(){ slotGrid2.innerHTML=''; if(!state.dateKey){ slotGrid2.innerHTML='<div class="slotTip important">請先選擇上方日期</div>'; return; } const list = (state.availabilityMap[state.dateKey]||[]).filter(t=>{ const h=parseInt(t); return state.tab==='am'?(h<12):state.tab==='pm'?(h>=12&&h<18):(h>=18); }); if(list.length===0){ slotGrid2.innerHTML='<div class="slotTip important">此時段無可預約時間</div>'; return; } list.forEach(t=>{ const disabled = !canBookNow(state.dateKey, t); const isSelected = state.cart.some(item => item.date === state.dateKey && item.time === t); const div=document.createElement('div'); div.className='slot'+(disabled?' disabled':'')+(isSelected?' sel':''); div.textContent=t; div.onclick=()=>{ if(!disabled) toggleCartItem(state.dateKey, t); }; slotGrid2.appendChild(div); }); }
  async function loadOptionsForCoach(){ state.weekStart = weekStartMonday(new Date()); state.loadingOptions=true; state.optionsRaw=[]; state.availabilityMap={}; state.dateKey=null; state.cart=[]; setStep(2); renderCoachIntro(); renderWeekStrip(); renderSlotsStep2(); renderCart(); try{ const res = await fetch(MAKE_OPTIONS_WEBHOOK_URL, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ action:"getOptions", coachName:state.coach.name, course:state.course, people:getPeopleCount(state.course), userId:state.uid, mode: state.mode }) }); const rawText = await res.text(); const safeText = rawText.trim().replace(/:\s*,/g, ': "",').replace(/:\s*}/g, ': ""}'); const data = JSON.parse(safeText); state.optionsRaw = Array.isArray(data.options)?data.options:[]; state.availabilityMap = buildAvailabilityMap(state.optionsRaw); const remain = data["Remaining credits"] ?? data.remainingCredits; if (remain !== undefined) state.remainingCredits = parseInt(remain, 10); renderCart(); }catch(e){} state.loadingOptions=false; renderWeekStrip(); renderSlotsStep2(); updateStatusInStep2(); }
  function renderCart(){ if (state.remainingCredits !== undefined && state.mode !== 'reschedule') { const currentLeft = state.remainingCredits - state.cart.length; const displayEl = document.getElementById('displayCredits'); if (displayEl) { displayEl.textContent = currentLeft; displayEl.style.color = currentLeft <= 0 ? 'var(--danger)' : 'var(--primary)'; } } cartList.innerHTML = ''; if (state.cart.length === 0) { cartList.innerHTML = '<div style="font-size:16px; font-weight:950; color:#aaa; text-align:center; padding:16px 10px;">尚未選擇時段</div>'; return; } state.cart.sort((a,b) => a.ts - b.ts).forEach(item => { const el = document.createElement('div'); el.className = 'cartItem'; const wd = weekdayZhFromDateKey(item.date); let btnHtml = ''; if (state.mode !== 'reschedule') { const av = getAvailableRecurringWeeks(item.date, item.time); if (av > 0) btnHtml = `<div class="repeatBtn">+包月</div>`; } el.innerHTML = `<span>${item.date} (${wd}) ${item.time}</span><div style="display:flex; align-items:center; gap:16px;">${btnHtml}<div class="delBtn">×</div></div>`; el.querySelector('.delBtn').onclick = () => toggleCartItem(item.date, item.time); cartList.appendChild(el); }); }
  function toggleCartItem(date, time) { const idx = state.cart.findIndex(i => i.date === date && i.time === time); if (idx >= 0) { state.cart.splice(idx, 1); } else { if (state.mode === 'reschedule' && state.cart.length >= 1) { Swal.fire({ icon: 'warning', title: '只能挑選一堂', text: '更改日期一次僅限調整一堂' }); return; } if (state.mode !== 'reschedule' && state.cart.length >= state.remainingCredits) { Swal.fire({ icon: 'warning', title: '額度不足', html: `您目前僅剩 <span style="font-weight:950;">${state.remainingCredits} 堂</span>` }); return; } const d = createSafeDate(date, time); state.cart.push({ date: date, time: time, ts: d.getTime() }); } renderCart(); renderSlotsStep2(); btnNext.disabled = state.cart.length === 0; updateStatusInStep2(); }
  init();
</script>
